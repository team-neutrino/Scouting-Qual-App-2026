<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Kinetic Loader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --deep-midnight: #0a0a1a;
            --electric-cyan: #00d4ff;
            --amber-glow: #ff9500;
            --liquid-silver: #c0c0d0;
            --void-black: #050510;
        }

        body {
            min-height: 100vh;
            background: var(--deep-midnight);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Bebas Neue', sans-serif;
        }

        /* Animated gradient mesh background */
        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(0, 212, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(255, 149, 0, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(192, 192, 208, 0.05) 0%, transparent 70%);
            animation: meshFlow 8s ease-in-out infinite;
        }

        @keyframes meshFlow {

            0%,
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }

            33% {
                transform: scale(1.1) rotate(2deg);
                opacity: 0.9;
            }

            66% {
                transform: scale(0.95) rotate(-1deg);
                opacity: 1;
            }
        }

        /* Noise texture overlay */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .loader-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            z-index: 10;
        }

        /* Main loading text with liquid effect */
        .loading-text {
            position: relative;
            font-size: clamp(4rem, 15vw, 12rem);
            letter-spacing: 0.15em;
            display: flex;
            gap: 0.1em;
        }

        .char {
            position: relative;
            display: inline-block;
            color: transparent;
            background: linear-gradient(135deg,
                    var(--liquid-silver) 0%,
                    var(--electric-cyan) 50%,
                    var(--amber-glow) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(0, 212, 255, 0.5));
            animation:
                liquidMorph 3s ease-in-out infinite,
                charFloat 2s ease-in-out infinite;
            animation-delay: calc(var(--char-index) * 0.1s);
            transform-origin: center bottom;
        }

        @keyframes liquidMorph {

            0%,
            100% {
                transform: translateY(0) scaleY(1) skewX(0deg);
                filter: drop-shadow(0 0 30px rgba(0, 212, 255, 0.5)) blur(0px);
            }

            25% {
                transform: translateY(-15px) scaleY(1.1) scaleX(0.95) skewX(-3deg);
                filter: drop-shadow(0 10px 40px rgba(0, 212, 255, 0.7)) blur(0.5px);
            }

            50% {
                transform: translateY(-5px) scaleY(0.95) scaleX(1.05) skewX(2deg);
                filter: drop-shadow(0 5px 35px rgba(255, 149, 0, 0.6)) blur(0px);
            }

            75% {
                transform: translateY(-20px) scaleY(1.05) scaleX(0.98) skewX(-1deg);
                filter: drop-shadow(0 15px 45px rgba(0, 212, 255, 0.8)) blur(0.3px);
            }
        }

        @keyframes charFloat {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        /* Liquid ripple effect behind text */
        .liquid-ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            pointer-events: none;
        }

        .ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid var(--electric-cyan);
            border-radius: 50%;
            opacity: 0;
            animation: rippleExpand 2s ease-out infinite;
        }

        .ripple:nth-child(1) {
            animation-delay: 0s;
        }

        .ripple:nth-child(2) {
            animation-delay: 0.5s;
        }

        .ripple:nth-child(3) {
            animation-delay: 1s;
        }

        .ripple:nth-child(4) {
            animation-delay: 1.5s;
        }

        @keyframes rippleExpand {
            0% {
                width: 0;
                height: 0;
                opacity: 0.8;
                border-width: 3px;
            }

            50% {
                opacity: 0.4;
            }

            100% {
                width: 150%;
                height: 150%;
                opacity: 0;
                border-width: 0px;
            }
        }

        /* Progress indicator */
        .progress-container {
            position: relative;
            width: 300px;
            height: 2px;
            background: rgba(192, 192, 208, 0.1);
            border-radius: 1px;
            overflow: hidden;
            margin-top: 2rem;
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent 0%,
                    var(--electric-cyan) 20%,
                    var(--amber-glow) 50%,
                    var(--electric-cyan) 80%,
                    transparent 100%);
            background-size: 200% 100%;
            animation:
                progressFlow 2s ease-in-out infinite,
                shimmer 1.5s linear infinite;
            border-radius: 1px;
            box-shadow: 0 0 20px var(--electric-cyan), 0 0 40px rgba(0, 212, 255, 0.5);
        }

        @keyframes progressFlow {
            0% {
                width: 0%;
                left: 0%;
            }

            50% {
                width: 60%;
                left: 20%;
            }

            100% {
                width: 0%;
                left: 100%;
            }
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--electric-cyan);
            border-radius: 50%;
            opacity: 0.6;
            animation: particleFloat 8s ease-in-out infinite;
            box-shadow: 0 0 10px var(--electric-cyan), 0 0 20px rgba(0, 212, 255, 0.5);
        }

        @keyframes particleFloat {

            0%,
            100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 0.6;
            }

            90% {
                opacity: 0.6;
            }

            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Loading percentage */
        .percentage {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            font-weight: 300;
            font-style: italic;
            color: var(--liquid-silver);
            letter-spacing: 0.3em;
            margin-top: 1.5rem;
            opacity: 0.8;
            animation: pulseText 2s ease-in-out infinite;
        }

        @keyframes pulseText {

            0%,
            100% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }
        }

        /* Mercury blob effect */
        .mercury-blob {
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle at 30% 30%, rgba(0, 212, 255, 0.3), transparent 70%);
            border-radius: 50%;
            filter: blur(40px);
            animation: blobMorph 6s ease-in-out infinite;
            pointer-events: none;
        }

        .mercury-blob:nth-child(1) {
            top: 20%;
            left: 10%;
            animation-delay: 0s;
        }

        .mercury-blob:nth-child(2) {
            top: 60%;
            right: 10%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 149, 0, 0.2), transparent 70%);
            animation-delay: -3s;
        }

        @keyframes blobMorph {

            0%,
            100% {
                border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
                transform: translate(0, 0) scale(1);
            }

            25% {
                border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%;
                transform: translate(30px, -30px) scale(1.1);
            }

            50% {
                border-radius: 50% 60% 30% 60% / 30% 40% 70% 60%;
                transform: translate(-20px, 20px) scale(0.9);
            }

            75% {
                border-radius: 60% 40% 60% 30% / 70% 30% 50% 60%;
                transform: translate(20px, 10px) scale(1.05);
            }
        }

        /* Exit animation */
        .loader-container.exiting {
            animation: exitLoader 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes exitLoader {
            0% {
                opacity: 1;
                transform: scale(1);
                filter: blur(0);
            }

            50% {
                opacity: 0.5;
                transform: scale(1.1);
                filter: blur(10px);
            }

            100% {
                opacity: 0;
                transform: scale(0.8);
                filter: blur(20px);
            }
        }
    </style>
</head>

<body>
    <div class="bg-mesh"></div>
    <div class="noise-overlay"></div>

    <div class="mercury-blob"></div>
    <div class="mercury-blob"></div>

    <div class="particles" id="particles"></div>

    <div class="loader-container" id="loader">
        <div class="loading-text" id="loadingText">
            <span class="char" style="--char-index: 0">L</span>
            <span class="char" style="--char-index: 1">O</span>
            <span class="char" style="--char-index: 2">A</span>
            <span class="char" style="--char-index: 3">D</span>
            <span class="char" style="--char-index: 4">I</span>
            <span class="char" style="--char-index: 5">N</span>
            <span class="char" style="--char-index: 6">G</span>
        </div>

        <div class="liquid-ripple">
            <div class="ripple"></div>
            <div class="ripple"></div>
            <div class="ripple"></div>
            <div class="ripple"></div>
        </div>

        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <div class="percentage" id="percentage">0%</div>
    </div>

    <script>
        // Create floating particles
        const particlesContainer = document.getElementById('particles');
        const particleCount = 20;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = (Math.random() * 5 + 5) + 's';
            particle.style.animationDelay = Math.random() * 8 + 's';
            particle.style.width = (Math.random() * 4 + 2) + 'px';
            particle.style.height = particle.style.width;
            particlesContainer.appendChild(particle);
        }

        // Animate percentage
        const percentageEl = document.getElementById('percentage');
        let progress = 0;
        const targetProgress = 100;
        const duration = 5000; // 5 seconds
        const startTime = Date.now();

        function updateProgress() {
            const elapsed = Date.now() - startTime;
            progress = Math.min((elapsed / duration) * targetProgress, targetProgress);
            percentageEl.textContent = Math.floor(progress) + '%';

            if (progress < targetProgress) {
                requestAnimationFrame(updateProgress);
            } else {
                // Trigger exit animation
                setTimeout(() => {
                    document.getElementById('loader').classList.add('exiting');
                    window.location.href = `new app/index.html?skipLoader=true`;
                }, 500);
            }
        }

        updateProgress();

        // Mouse interaction - subtle parallax effect
        document.addEventListener('mousemove', (e) => {
            const chars = document.querySelectorAll('.char');
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const moveX = (e.clientX - centerX) / 50;
            const moveY = (e.clientY - centerY) / 50;

            chars.forEach((char, index) => {
                const factor = (index - 3) * 0.5;
                char.style.transform = `translate(${moveX * factor}px, ${moveY * factor}px)`;
            });
        });
    </script>
</body>

</html>
